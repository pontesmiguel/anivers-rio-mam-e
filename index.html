<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Feliz Aniversário Mãe ❤️</title>

<style>

body{
margin:0;
font-family:Arial;
text-align:center;
background:linear-gradient(135deg,#ff9a9e,#fad0c4);
overflow-x:hidden;
}

h1{
margin-top:40px;
font-size:55px;
color:white;
animation:aparecer 2s;
}

p{
font-size:22px;
color:white;
max-width:700px;
margin:auto;
}

@keyframes aparecer{
from{opacity:0; transform:translateY(-40px)}
to{opacity:1}
}

.slideshow{
margin-top:40px;
}

.slideshow img{
width:350px;
border-radius:20px;
box-shadow:0 10px 25px rgba(0,0,0,0.3);
}

footer{
color:white;
font-size:18px;
margin:40px;
}

/* corações */

.heart{
position:fixed;
top:-10px;
color:red;
font-size:20px;
animation:fall linear forwards;
}

@keyframes fall{
to{transform:translateY(100vh);}
}

</style>
</head>

<body>

<h1>Feliz Aniversário Mamãe ❤️</h1>

<p>
Mamãe, hoje é um dia muito especial.  
Obrigado por tudo que a sra. faz por mim todos os dias e já fez
Eu te amo muito! 💖
</p>
<img src="foto1.jpg" width="300">

<div class="slideshow">
<img id="foto" src="foto1.jpg">

</div>

<footer>
Com amor, Tuco Tuco❤️
</footer>

<audio autoplay loop>
<source src="musica.mp3">
</audio>

<script>

/* CORAÇÕES */

function criarCoracao(){

const heart=document.createElement("div")

heart.classList.add("heart")
heart.innerHTML="❤️"

heart.style.left=Math.random()*100+"vw"
heart.style.animationDuration=(Math.random()*3+2)+"s"

document.body.appendChild(heart)

setTimeout(()=>{
heart.remove()
},5000)

}

setInterval(criarCoracao,300)

/* SLIDESHOW */

const fotos=[
"foto1.jpg",
"foto2.jpg",
"foto3.jpg",
"foto4.jpg",
"foto5.jpg",
"foto6.jpg",
"foto7.jpg",
"foto8.jpg",
"foto9.jpg",
"foto10.jpg"
]

let index=0

setInterval(()=>{

index++

if(index>=fotos.length){
index=0
}

document.getElementById("foto").src=fotos[index]

},3000)

</script>

</body>

</html>
